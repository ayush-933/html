<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application</title>
</head>
<body>
    <form >
        <h2>Job Application</h2>
        <label for="name">name:</label>
        <br>
        <input type="text" id="name">
        <br>
         <label for="email">email:</label>
        <br>
        <input type="email" id="email">
        <br>
         <label for="phone">phone:</label>
        <br>
        <input type="tel" id="phone">
        <br>
        <label for="resume">Resume</label>
        <br>
        <input type="file" id="resume">
        <br>
        <label for="experience">Experience(in years):</label>
        <br>
        <input type="number" id="experience" min="0" max="10">
        <fieldset>
            <legend>Skills</legend>
            <input type="checkbox" id="checkbox1" name="checkbox">
            <br>
            <label for="checkbox1">HTML</label>
            <br>
             <input type="checkbox" id="checkbox2" name="checkbox">
            <br>
            <label for="checkbox2">CSS</label>
            <br>
             <input type="checkbox" id="checkbox3" name="checkbox">
            <br>
            <label for="checkbox3">JavaScript</label>
            <br>
        </fieldset>
        <label for="education">Higest Education</label >
        <br>
        <select id="education" name="education">
            <option value="">choose your education</option>
            <option value="high school">high school</option>
            <option value="inter">inter</option>
            <option value="graduation">graduation</option>
        </select>
        <p>Availability:</p>
        
        <input type="radio" id="radio1" name="radio">
        <br>
        <label for="radio1">Full Time</label>
        <br>
        <input type="radio" id="radio2" name="radio">
        <br>
        <label for="radio2">Part Time</label>
        <br>
        <label for="comments">Additional comments</label>
        <br>
        <textarea name="comments" id="comments" cols="50" rows="1"></textarea>
        <button >Submit Application</button>

    </form>
</body>
</html>
